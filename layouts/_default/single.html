{{ define "main" }}
<main id="main">
	<section class="page-hero u-grid-ink">
		<div class="container">
			<span class="u-kicker -inv">Legal</span>
			<h1>{{ with .Params.header }}{{ . }}{{ else }}{{ .Title }}{{ end }}</h1>
			{{ with .Description }}<p>{{ . }}</p>{{ end }}
		</div>
	</section>

	<section class="section">
		<div class="container">
			<article class="prose">
				{{ .Content }}
			</article>
		</div>
	</section>
</main>
{{ end }}
