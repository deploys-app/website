{{- /* Brand lockup — product logo + wordmark. Used in navbar + footer. */ -}}
{{- $webp := resources.Get "image/logo.webp" | resources.Fingerprint -}}
{{- $png := resources.Get "image/logo.png" | resources.Fingerprint -}}
<a class="navbar-brand" href="/" aria-label="Deploys.app home">
	<picture>
		<source srcset="{{ $webp.RelPermalink }}" type="image/webp">
		<img class="brand-logo" src="{{ $png.RelPermalink }}" width="30" height="30" alt="Deploys.app" decoding="async">
	</picture>
	<span><b>deploys</b><span class="dim">.app</span></span>
</a>
